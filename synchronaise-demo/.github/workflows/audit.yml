name: SynchronAIse Design Audit

on:
  pull_request:
    paths:
      - "src/components/**"
      - "src/tokens.json"
      - "src/tokens.css"

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SynchronAIse design audit
        # Points at the reusable action in the tool repo. Replace <org> with the
        # GitHub org/user hosting the SynchronAIse tool repo.
        uses: <org>/synchronaise/action@main
        with:
          audit-api-url: ${{ secrets.AUDIT_API_URL }}
          studio-base-url: ${{ vars.STUDIO_BASE_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          component-glob: "src/components/**/*.tsx"
          tokens-path: "src/tokens.json"
